name: Bug report
description: Something in Venom's install, CLI, or generated team isn't working as documented.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more concrete the details, the faster it gets fixed.
        Please don't include secrets or private paths in what you paste.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened instead?
      placeholder: I ran `npx venomkit init --pack solo-minimal` and expected ..., but ...
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command you ran
      placeholder: npx venomkit init --pack web-app --yes
    validations:
      required: false
  - type: dropdown
    id: pack
    attributes:
      label: Which pack?
      options:
        - web-app
        - data-ml
        - research-academic
        - writing-content
        - security-audit
        - solo-minimal
        - Not sure / not applicable
    validations:
      required: false
  - type: dropdown
    id: tool
    attributes:
      label: Which coding-tool adapter?
      options:
        - claude-code
        - Other / not applicable
    validations:
      required: false
  - type: input
    id: venom-version
    attributes:
      label: Venom version
      description: Output of `npx venomkit --version`, or the `version` field in `.venom/install.json`.
      placeholder: 0.1.0
    validations:
      required: false
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or error
      description: Paste any terminal output. It renders as code — no backticks needed.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before you file
      options:
        - label: I'm on Node.js 18.17 or newer.
        - label: I searched existing issues and didn't find a duplicate.
